    <script>
        const bounds = {
            nw: { lat: 35.4450, lng: 138.5121 },
            se: { lat: 35.1517, lng: 138.7423 }
        };

        const overlayImgUrl = "https://shibakin507.github.io/-NAVI/data/miyamap.jpg";
        const overlayBounds = {
            nw: { lat: 35.47815, lng: 138.4040 },
            se: { lat: 35.0961, lng: 138.8335 }
        };

        let centerCoords = { lat: 35.2220, lng: 138.6217 };
        
        const ZOOM = 12; 
        const STD_ZOOM = ZOOM + 2; 
        const ELEVATION_SCALE = 0.02; 

        const OPACITY_HILLSHADE = 0.40; 
        const OPACITY_STD = 1.00;       

        function lngToTileX(lng, zoom) { 
            return Math.floor((lng + 180) / 360 * Math.pow(2, zoom)); 
        }
        function latToTileY(lat, zoom) { 
            return Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, zoom)); 
        }
        function tileXToLng(x, zoom) { 
            return x / Math.pow(2, zoom) * 360 - 180; 
        }
        function tileYToLat(y, zoom) {
            const n = Math.PI - 2 * Math.PI * y / Math.pow(2, zoom);
            return 180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
        }

        const minX = lngToTileX(bounds.nw.lng, ZOOM);
        const maxX = lngToTileX(bounds.se.lng, ZOOM);
        const minY = latToTileY(bounds.nw.lat, ZOOM);
        const maxY = latToTileY(bounds.se.lat, ZOOM);

        const tileWidthCount = maxX - minX + 1;
        const tileHeightCount = maxY - minY + 1;

        const totalLngWidth = tileXToLng(maxX + 1, ZOOM) - tileXToLng(minX, ZOOM);
        const totalLatHeight = tileYToLat(minY, ZOOM) - tileYToLat(maxY + 1, ZOOM);
        
        const sceneWidth = tileWidthCount * 100;
        const sceneHeight = tileHeightCount * 100;

        const minLng = tileXToLng(minX, ZOOM);
        const maxLat = tileYToLat(minY, ZOOM);

        function coordsToScenePos(lat, lng) {
            const x = ((lng - minLng) / totalLngWidth) * sceneWidth - (sceneWidth / 2);
            const z = ((maxLat - lat) / totalLatHeight) * sceneHeight - (sceneHeight / 2);
            return { x, z };
        }

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 25000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(200, 500, 200);
        scene.add(dirLight);

        const segmentsX = tileWidthCount * 24; 
        const segmentsY = tileHeightCount * 24;
        const geometry = new THREE.PlaneGeometry(sceneWidth, sceneHeight, segmentsX, segmentsY);
        geometry.rotateX(-Math.PI / 2);

        const material = new THREE.MeshStandardMaterial({
            color: 0xffffff, roughness: 0.8, metalness: 0.1, side: THREE.DoubleSide
        });
        const terrainMesh = new THREE.Mesh(geometry, material);
        scene.add(terrainMesh);

        let currentPosGroup = null; 
        let arrowMesh = null;       

        function createCoolMarker() {
            currentPosGroup = new THREE.Group();

            const circleGeo = new THREE.RingGeometry(0, 5, 32);
            const circleMat = new THREE.MeshBasicMaterial({ color: 0xcc0000, side: THREE.DoubleSide, transparent: true, opacity: 0.4 });
            const circleMesh = new THREE.Mesh(circleGeo, circleMat);
            circleMesh.rotateX(-Math.PI / 2); 
            currentPosGroup.add(circleMesh);

            const edgeGeo = new THREE.RingGeometry(4.8, 5, 32);
            const edgeMat = new THREE.MeshBasicMaterial({ color: 0xff5555, side: THREE.DoubleSide });
            const edgeMesh = new THREE.Mesh(edgeGeo, edgeMat);
            edgeMesh.rotateX(-Math.PI / 2);
            currentPosGroup.add(edgeMesh);

            const coneGeo = new THREE.ConeGeometry(1.8, 6, 4);
            const coneMat = new THREE.MeshStandardMaterial({ 
                color: 0xff0000, roughness: 0.3, metalness: 0.8, emissive: 0x550000 
            });
            arrowMesh = new THREE.Mesh(coneGeo, coneMat);
            arrowMesh.rotateX(Math.PI); 
            arrowMesh.position.y = 6.0; 
            currentPosGroup.add(arrowMesh);

            currentPosGroup.visible = false; 
            scene.add(currentPosGroup);
        }

];

        const bearPins = [];

        function createBearMarkers() {
            bearSpots.forEach((spot, idx) => {
                if (spot.lat <= bounds.nw.lat && spot.lat >= bounds.se.lat &&
                    spot.lng >= bounds.nw.lng && spot.lng <= bounds.se.lng) {
                    
                    const group = new THREE.Group();
                    const pos = coordsToScenePos(spot.lat, spot.lng);
                    const terrainY = getTerrainYAt(pos.x, pos.z);

                    
                    const ringGeo = new THREE.RingGeometry(0, 3.5, 32);
                    const ringMat = new THREE.MeshBasicMaterial({ color: 0xd9534f, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
                    const ringMesh = new THREE.Mesh(ringGeo, ringMat);
                    ringMesh.rotateX(-Math.PI / 2);
                    group.add(ringMesh);

                    
                    const coneGeo = new THREE.ConeGeometry(2, 7, 6);
                    const coneMat = new THREE.MeshStandardMaterial({ 
                        color: 0x222222, roughness: 0.5, metalness: 0.5, emissive: 0x331100
                    });
                    const coneMesh = new THREE.Mesh(coneGeo, coneMat);
                    coneMesh.position.y = 3.5;
                    group.add(coneMesh);

                    
                    const stripeGeo = new THREE.CylinderGeometry(1.2, 1.4, 1.5, 6);
                    const stripeMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
                    const stripeMesh = new THREE.Mesh(stripeGeo, stripeMat);
                    stripeMesh.position.y = 3.0;
                    group.add(stripeMesh);

                    group.position.set(pos.x, terrainY, pos.z);
                    
                    
                    group.userData = { 
                        note: spot.note,
                        isBearMarker: true
                    };

                    scene.add(group);
                    bearPins.push(group);
                }
            });
        }

        const rawWidth = tileWidthCount * 1024;
        const rawHeight = tileHeightCount * 1024;
        const MAX_CANVAS_SIZE = 2560; 
        
        let scaleFactor = 1.0;
        if (rawWidth > MAX_CANVAS_SIZE || rawHeight > MAX_CANVAS_SIZE) {
            scaleFactor = MAX_CANVAS_SIZE / Math.max(rawWidth, rawHeight);
        }

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = Math.floor(rawWidth * scaleFactor); 
        canvas.height = Math.floor(rawHeight * scaleFactor);

        const hillshadeCanvas = document.createElement('canvas');
        const hillshadeCtx = hillshadeCanvas.getContext('2d');
        hillshadeCanvas.width = canvas.width; 
        hillshadeCanvas.height = canvas.height;

        const stdCanvas = document.createElement('canvas');
        const stdCtx = stdCanvas.getContext('2d');
        stdCanvas.width = canvas.width; 
        stdCanvas.height = canvas.height;

        const demCanvas = document.createElement('canvas');
        const demCtx = demCanvas.getContext('2d');
        demCanvas.width = tileWidthCount * 256; 
        demCanvas.height = tileHeightCount * 256;

        let loadedCount = 0;
        const totalTiles = tileWidthCount * tileHeightCount;
        const totalTasks = (totalTiles * 2) + (totalTiles * 16) + 1; 

        let targetPos = coordsToScenePos(centerCoords.lat, centerCoords.lng);
        let baseTargetY = 15; 
        let demDataGlobal = null; 

        const imgOverlay = new Image();
        let texture = null;
        imgOverlay.crossOrigin = "anonymous";
        imgOverlay.src = overlayImgUrl;
        imgOverlay.onload = () => { checkProgress(); };

        function updateTextureCanvas() {
            const currentOpacity = parseFloat(document.getElementById('opacity-slider').value) / 100;
            
            ctx.fillStyle = "#ffffff"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.globalAlpha = OPACITY_HILLSHADE; 
            ctx.drawImage(hillshadeCanvas, 0, 0, canvas.width, canvas.height);
            
            ctx.globalAlpha = OPACITY_STD; 
            ctx.globalCompositeOperation = "multiply"; 
            ctx.drawImage(stdCanvas, 0, 0, canvas.width, canvas.height);
            
            ctx.globalCompositeOperation = "source-over"; 
            ctx.globalAlpha = 1.0;

            const startX = (((overlayBounds.nw.lng - minLng) / totalLngWidth) * rawWidth) * scaleFactor;
            const startY = (((maxLat - overlayBounds.nw.lat) / totalLatHeight) * rawHeight) * scaleFactor;
            const endX = (((overlayBounds.se.lng - minLng) / totalLngWidth) * rawWidth) * scaleFactor;
            const endY = (((maxLat - overlayBounds.se.lat) / totalLatHeight) * rawHeight) * scaleFactor;
            
            ctx.globalAlpha = currentOpacity; 
            ctx.drawImage(imgOverlay, startX, startY, endX - startX, endY - startY);
            ctx.globalAlpha = 1.0; 

            if (texture) texture.needsUpdate = true;
        }

        for (let ty = minY; ty <= maxY; ty++) {
            for (let tx = minX; tx <= maxX; tx++) {
                const offsetX2x = (tx - minX) * 1024 * scaleFactor; 
                const offsetY2x = (ty - minY) * 1024 * scaleFactor;
                const size2x = 1024 * scaleFactor;
                const offsetX1x = (tx - minX) * 256;  
                const offsetY1x = (ty - minY) * 256;

                const imgHillshade = new Image();
                imgHillshade.crossOrigin = "anonymous";
                imgHillshade.src = `https://cyberjapandata.gsi.go.jp/xyz/hillshademap/${ZOOM}/${tx}/${ty}.png`;
                imgHillshade.onload = () => { 
                    hillshadeCtx.drawImage(imgHillshade, offsetX2x, offsetY2x, size2x, size2x); 
                    checkProgress(); 
                };

                const imgDem = new Image();
                imgDem.crossOrigin = "anonymous";
                imgDem.src = `https://cyberjapandata.gsi.go.jp/xyz/dem_png/${ZOOM}/${tx}/${ty}.png`;
                imgDem.onload = () => { 
                    demCtx.drawImage(imgDem, offsetX1x, offsetY1x, 256, 256); 
                    checkProgress(); 
                };

                const pMinX = tx * 4; 
                const pMinY = ty * 4;
                for (let dy = 0; dy < 4; dy++) {
                    for (let dx = 0; dx < 4; dx++) {
                        const subOffsetX = offsetX2x + (dx * 256 * scaleFactor);
                        const subOffsetY = offsetY2x + (dy * 256 * scaleFactor);
                        const subSize = 256 * scaleFactor;

                        const imgStd = new Image();
                        imgStd.crossOrigin = "anonymous";
                        imgStd.src = `https://cyberjapandata.gsi.go.jp/xyz/std/${STD_ZOOM}/${pMinX + dx}/${pMinY + dy}.png`;
                        imgStd.onload = () => { 
                            stdCtx.drawImage(imgStd, subOffsetX, subOffsetY, subSize, subSize); 
                            checkProgress(); 
                        };
                    }
                }
            }
        }

        function checkProgress() {
            loadedCount++;
            const percent = Math.floor((loadedCount / totalTasks) * 100);
            document.getElementById('loading-text').innerText = `3D地図データを読み込み中... (${percent}%)`;
            document.getElementById('loading-bar').style.width = `${percent}%`;

            if (loadedCount === totalTasks) { 
                updateTextureCanvas(); 
                applyDataToTerrain(); 
                
                const screen = document.getElementById('loading-screen');
                screen.style.opacity = '0';
                setTimeout(() => { screen.style.visibility = 'hidden'; }, 500);
            }
        }

        function getElevation(r, g, b) {
            const x = r * 65536 + g * 256 + b;
            return x < 8388608 ? x * 0.01 : (x - 16777216) * 0.01;
        }

        function getTerrainYAt(x, z) {
            if (!demDataGlobal) return 15;
            const percentX = (x + sceneWidth / 2) / sceneWidth;
            const percentY = (z + sceneHeight / 2) / sceneHeight;
            
            const pixelX = Math.max(0, Math.min(Math.floor(percentX * demCanvas.width), demCanvas.width - 2));
            const pixelY = Math.max(0, Math.min(Math.floor(percentY * demCanvas.height), demCanvas.height - 2));
            const idx = (pixelY * demCanvas.width + pixelX) * 4;
            
            if (demDataGlobal[idx] === undefined || (demDataGlobal[idx] === 128 && demDataGlobal[idx+1] === 0 && demDataGlobal[idx+2] === 0)) {
                return 0; 
            }
            return getElevation(demDataGlobal[idx], demDataGlobal[idx+1], demDataGlobal[idx+2]) * ELEVATION_SCALE;
        }

        function applyDataToTerrain() {
            texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            material.map = texture; 
            material.needsUpdate = true;

            demDataGlobal = demCtx.getImageData(0, 0, demCanvas.width, demCanvas.height).data;
            const posAttr = geometry.attributes.position;
            
            for (let i = 0; i < posAttr.count; i++) { 
                posAttr.setY(i, getTerrainYAt(posAttr.getX(i), posAttr.getZ(i))); 
            }
            
            baseTargetY = getTerrainYAt(targetPos.x, targetPos.z);
            geometry.computeVertexNormals(); 
            posAttr.needsUpdate = true;

            createCoolMarker(); 
            createBearMarkers(); 
            updateCameraPosition();
        }

        const rotateSlider = document.getElementById('rotate-slider');
        const heightSlider = document.getElementById('height-slider');
        const pitchSlider = document.getElementById('pitch-slider');
        const zoomSlider = document.getElementById('zoom-slider');
        const opacitySlider = document.getElementById('opacity-slider');

        const labelRotate = document.getElementById('label-rotate');
        const labelHeight = document.getElementById('label-height');
        const labelPitch = document.getElementById('label-pitch');
        const labelZoom = document.getElementById('label-zoom');
        const labelOpacity = document.getElementById('label-opacity');
        
        function updateCameraPosition() {
            const cameraDistance = 680 - parseFloat(zoomSlider.value);         
            const pitchRad = (parseFloat(pitchSlider.value) * Math.PI) / 180;
            
            const verticalOffset = cameraDistance * Math.sin(pitchRad); 
            const horizontalRadius = cameraDistance * Math.cos(pitchRad);
            const angleRad = (parseFloat(rotateSlider.value) * Math.PI) / 180;
            const currentTargetY = baseTargetY + parseFloat(heightSlider.value);

            camera.position.set(
                targetPos.x + horizontalRadius * Math.sin(angleRad),
                currentTargetY + verticalOffset,
                targetPos.z + horizontalRadius * Math.cos(angleRad)
            );
            camera.lookAt(targetPos.x, currentTargetY, targetPos.z);
            
            labelRotate.innerText = `水平回転:${rotateSlider.value}°`;
            labelHeight.innerText = `上下移動:${heightSlider.value}`;
            labelPitch.innerText = `仰角:${pitchSlider.value}°`;
            labelZoom.innerText = `拡大縮小:${zoomSlider.value}`;
        }

        rotateSlider.addEventListener('input', updateCameraPosition);
        heightSlider.addEventListener('input', updateCameraPosition);
        pitchSlider.addEventListener('input', updateCameraPosition);
        zoomSlider.addEventListener('input', updateCameraPosition);
        opacitySlider.addEventListener('input', () => {
            labelOpacity.innerText = `画像透過度:${opacitySlider.value}%`; 
            updateTextureCanvas();
        });

        
        const toggleUiBtn = document.getElementById('toggle-ui-btn');
        const uiContainer = document.getElementById('ui-container');
        const btnCloseUi = document.getElementById('btn-close-ui');

        toggleUiBtn.addEventListener('click', () => {
            uiContainer.classList.toggle('hidden');
        });

        btnCloseUi.addEventListener('click', () => {
            uiContainer.classList.add('hidden');
        });

        let watchId = null; 
        const geoBtn = document.getElementById('btn-geolocation');

        geoBtn.addEventListener('click', () => {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                geoBtn.classList.remove('active');
                geoBtn.innerText = "現在位置";
                if (currentPosGroup) currentPosGroup.visible = false;
                return;
            }

            if (!navigator.geolocation) {
                geoBtn.innerText = "非対応";
                return;
            }

            geoBtn.classList.add('active');
            geoBtn.innerText = "追跡中";

            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;

                    if (userLat > bounds.nw.lat || userLat < bounds.se.lat || 
                        userLng < bounds.nw.lng || userLng > bounds.se.lng) {
                        geoBtn.innerText = "範囲外";
                        navigator.geolocation.clearWatch(watchId);
                        watchId = null;
                        geoBtn.classList.remove('active');
                        if (currentPosGroup) currentPosGroup.visible = false;
                        return;
                    }

                    geoBtn.innerText = "追跡中";

                    const newPos = coordsToScenePos(userLat, userLng);
                    targetPos.x = newPos.x;
                    targetPos.z = newPos.z;
                    baseTargetY = getTerrainYAt(targetPos.x, targetPos.z);

                    if (currentPosGroup) {
                        currentPosGroup.position.set(targetPos.x, baseTargetY, targetPos.z);
                        currentPosGroup.visible = true;
                    }
                    updateCameraPosition();
                },
                (error) => {
                    geoBtn.innerText = "エラー";
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                    geoBtn.classList.remove('active');
                    if (currentPosGroup) currentPosGroup.visible = false;
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        });

        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const popup = document.getElementById('bear-popup');
        const popupContent = document.getElementById('bear-popup-content');
        const popupClose = document.getElementById('bear-popup-close');

        
        popupClose.addEventListener('click', () => {
            popup.classList.remove('show');
        });

        
        window.addEventListener('pointerdown', onPointerDown);

        let pointerStartX = 0;
        let pointerStartY = 0;

        function onPointerDown(event) {
            
            if (event.target.closest('#ui-container') || 
                event.target.closest('#toggle-ui-btn') || 
                event.target.closest('#bear-popup')) {
                return;
            }
            
            pointerStartX = event.clientX;
            pointerStartY = event.clientY;

            
            window.addEventListener('pointerup', onPointerUp);
        }

        function onPointerUp(event) {
            window.removeEventListener('pointerup', onPointerUp);

            
            const diffX = Math.abs(event.clientX - pointerStartX);
            const diffY = Math.abs(event.clientY - pointerStartY);
            if (diffX > 5 || diffY > 5) return;

            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            
            const intersects = raycaster.intersectObjects(bearPins, true);

            if (intersects.length > 0) {
                
                let obj = intersects[0].object;
                let matchedMarker = null;

                while (obj) {
                    if (obj.userData && obj.userData.isBearMarker) {
                        matchedMarker = obj;
                        break;
                    }
                    obj = obj.parent;
                }

                if (matchedMarker) {
                    
                    popupContent.innerHTML = matchedMarker.userData.note;
                    popup.classList.add('show');
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (currentPosGroup && currentPosGroup.visible) {
                const time = Date.now() * 0.003;
                arrowMesh.position.y = 6.0 + Math.sin(time) * 0.4;
            }
            
            
            bearPins.forEach((pin, index) => {
                pin.rotation.y += 0.01 + (index * 0.002);
            });

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
